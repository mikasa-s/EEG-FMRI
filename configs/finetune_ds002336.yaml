train:
  force_cpu: false
  gpu_count: 1
  gpu_ids: []
  batch_size: 128
  eval_batch_size: 128
  num_workers: 2
  # gpu_ids: [4]
  # batch_size: 256
  # eval_batch_size: 256
  # num_workers: 4
  pin_memory: true

data:
  train_manifest_csv: cache/ds002336/loso_subjectwise/fold_ds002336_sub01/manifest_train.csv
  val_manifest_csv: cache/ds002336/loso_subjectwise/fold_ds002336_sub01/manifest_val.csv
  test_manifest_csv: cache/ds002336/loso_subjectwise/fold_ds002336_sub01/manifest_test.csv
  root_dir: cache/ds002336
  preload_dataset: true
  eeg_channel_subset: none
  eeg_channel_target_manifest: cache/ds002336/eeg_channels_target.csv
  expected_eeg_shape: [63, 8, 200]
  normalize_eeg: true
  eeg_scale: 1.0

eeg_model:
  checkpoint_path: ""
  in_dim: 200
  out_dim: 200
  d_model: 200
  dim_feedforward: 800
  seq_len: 8
  shared_dim: 256
  private_dim: 256
  band_power_dim: 5
  n_layer: 6
  nhead: 8
  freeze_backbone: false

finetune:
  output_dir: outputs/ds002336/finetune/fold_ds002336_sub01
  contrastive_checkpoint_path: ""
  allow_missing_pretrain_checkpoint: true
  pretrain_mode: strict
  pretrain_objective: contrastive
  pretrain_output_root: pretrained_weights
  num_classes: 2
  selection_metric: accuracy
  fusion: eeg_only
  classifier_mode: add
  eeg_baseline:
    enabled: false
    model_name: eegnet # 7 个选项：svm, labram, cbramod, eeg_deformer, eegnet, conformer
    num_classes: 2
    num_channels: 63
    num_timepoints: 200
    load_pretrained_weights: false
    checkpoint_path: ""
  hidden_dim: 128
  dropout: 0.3
  freeze_encoders: false
  epochs: 200
  lr: 3.3444564916820124e-05
  min_lr: 5.0e-05
  weight_decay: 0.01
  grad_clip: 1.0
  early_stop_patience: 35
  early_stop_min_delta: 0.0
  use_amp: true
  amp_dtype: fp16
  log_interval: 100
  eval_interval: 1
  visualization:
    train_curve:
      enabled: false
      output_dir: ""
    confusion_matrix:
      enabled: false
