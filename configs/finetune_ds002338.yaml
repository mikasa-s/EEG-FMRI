train:
  force_cpu: false
  gpu_count: 1
  gpu_ids: [6]
  batch_size: 128
  eval_batch_size: 128
  num_workers: 4
  pin_memory: true

data:
  train_manifest_csv: cache/ds002338/loso_subjectwise/fold_ds002338_sub01/manifest_train.csv
  val_manifest_csv: cache/ds002338/loso_subjectwise/fold_ds002338_sub01/manifest_val.csv
  test_manifest_csv: cache/ds002338/loso_subjectwise/fold_ds002338_sub01/manifest_test.csv
  root_dir: cache/ds002338
  preload_dataset: true
  eeg_channel_subset: auto
  eeg_channel_target_manifest: cache/ds002338/eeg_channels_target.csv
  expected_eeg_shape: [63, 8, 200]
  expected_fmri_shape: [48, 48, 48, 1]
  normalize_eeg: true
  normalize_fmri: true
  eeg_scale: 1.0
  fmri_scale: 1.0
  fmri_input_type: volume
  fmri_target_shape: [48, 48, 48, 1]
  fmri_spatial_strategy: pad_or_crop
  fmri_temporal_strategy: pad_or_crop
  fmri_pad_value: 0.0
  fmri_normalize_nonzero_only: true

eeg_model:
  checkpoint_path: ""
  in_dim: 200
  out_dim: 200
  d_model: 200
  dim_feedforward: 800
  seq_len: 8
  shared_dim: 256
  private_dim: 256
  band_power_dim: 5
  n_layer: 6
  nhead: 8
  freeze_backbone: false

fmri_model:
  backbone: neurostorm
  checkpoint_path: "pretrained_weights/pt_neurostorm_mae_ratio0.5.ckpt"
  shared_dim: 256
  img_size: [48, 48, 48, 1]
  in_chans: 1
  embed_dim: 24
  first_window_size: [2, 2, 2, 2]
  window_size: [4, 4, 4, 4]
  patch_size: [6, 6, 6, 1]
  depths: [2, 2, 6, 2]
  num_heads: [3, 6, 12, 24]
  c_multiplier: 2
  last_layer_full_MSA: false
  attn_drop_rate: 0.0
  freeze_backbone: false

finetune:
  output_dir: outputs/ds002338/finetune/fold_ds002338_sub01
  contrastive_checkpoint_path: ""
  pretrain_mode: strict
  pretrain_objective: contrastive
  pretrain_output_root: pretrained_weights
  num_classes: 2
  selection_metric: accuracy
  fusion: eeg_only
  classifier_mode: add
  eeg_baseline:
    enabled: false
    model_name: cbramod
    num_classes: 2
    num_channels: 63
    num_timepoints: 1600
    load_pretrained_weights: false
    checkpoint_path: ""
  hidden_dim: 512
  dropout: 0.3
  freeze_encoders: false
  epochs: 200
  lr: 7.870238885014188e-05
  min_lr: 2.0e-06
  weight_decay: 1.0e-05
  grad_clip: 0.0
  early_stop_patience: 35
  early_stop_min_delta: 0.0
  use_amp: true
  amp_dtype: fp16
  log_interval: 100
  eval_interval: 1
  visualization:
    train_curve:
      enabled: false
      output_dir: ""
    confusion_matrix:
      enabled: false
