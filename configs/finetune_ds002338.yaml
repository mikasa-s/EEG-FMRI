train:
  force_cpu: false
  gpu_count: 1
  gpu_ids: []
  batch_size: 16
  eval_batch_size: 32
  num_workers: 4
  pin_memory: true

data:
  train_manifest_csv: cache/ds002338/loso_subjectwise/fold_ds002338_sub01/manifest_train.csv
  val_manifest_csv: cache/ds002338/loso_subjectwise/fold_ds002338_sub01/manifest_val.csv
  test_manifest_csv: cache/ds002338/loso_subjectwise/fold_ds002338_sub01/manifest_test.csv
  root_dir: cache/ds002338
  preload_dataset: true
  eeg_channel_subset: auto
  expected_eeg_shape: [63, 8, 200]
  expected_fmri_shape: [48, 48, 48, 10]
  normalize_eeg: true
  normalize_fmri: true
  eeg_scale: 1.0
  fmri_scale: 1.0
  fmri_input_type: volume
  fmri_target_shape: [48, 48, 48, 10]
  fmri_spatial_strategy: pad_or_crop
  fmri_temporal_strategy: pad_or_crop
  fmri_pad_value: 0.0
  fmri_normalize_nonzero_only: true

eeg_model:
  checkpoint_path: ""
  in_dim: 200
  out_dim: 200
  d_model: 200
  dim_feedforward: 800
  seq_len: 8
  n_layer: 12
  nhead: 8
  freeze_backbone: false

fmri_model:
  backbone: neurostorm
  checkpoint_path: ""
  img_size: [48, 48, 48, 10]
  in_chans: 1
  embed_dim: 24
  first_window_size: [2, 2, 2, 2]
  window_size: [4, 4, 4, 4]
  patch_size: [6, 6, 6, 1]
  depths: [2, 2, 6, 2]
  num_heads: [3, 6, 12, 24]
  c_multiplier: 2
  last_layer_full_MSA: false
  attn_drop_rate: 0.0
  freeze_backbone: false

finetune:
  output_dir: outputs/ds002338/finetune/fold_ds002338_sub01
  contrastive_checkpoint_path: ""
  num_classes: 2
  selection_metric: accuracy
  fusion: eeg_only
  eeg_baseline:
    enabled: false
    model_name: cbramod
    num_classes: 2
    num_channels: 62
    num_timepoints: 200
    load_pretrained_weights: false
    checkpoint_path: ""
  hidden_dim: 256
  dropout: 0.2
  freeze_encoders: false
  epochs: 1
  lr: 0.0005
  min_lr: 0.00005
  weight_decay: 0.01
  grad_clip: 1.0
  early_stop_patience: 10
  early_stop_min_delta: 0.0
  use_amp: true
  amp_dtype: fp16
  log_interval: 100
  eval_interval: 1
