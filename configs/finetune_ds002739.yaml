train:
  force_cpu: false
  gpu_count: 1
  gpu_ids: [4]
  batch_size: 128
  eval_batch_size: 128
  num_workers: 4
  pin_memory: true

data:
  train_manifest_csv: cache/ds002739/loso_subjectwise/fold_ds002739_sub01/manifest_train.csv
  val_manifest_csv: cache/ds002739/loso_subjectwise/fold_ds002739_sub01/manifest_val.csv
  test_manifest_csv: cache/ds002739/loso_subjectwise/fold_ds002739_sub01/manifest_test.csv
  root_dir: cache/ds002739
  preload_dataset: false
  subject_pack_cache_size: 24
  eeg_channel_subset: auto
  eeg_channel_target_manifest: cache/ds002739/eeg_channels_target.csv
  expected_eeg_shape: [53, 4, 200]
  normalize_eeg: true
  eeg_scale: 1.0

eeg_model:
  checkpoint_path: ""
  in_dim: 200
  out_dim: 200
  d_model: 200
  dim_feedforward: 800
  seq_len: 4
  shared_dim: 256
  private_dim: 256
  band_power_dim: 5
  n_layer: 12
  nhead: 8
  freeze_backbone: false

finetune:
  output_dir: outputs/ds002739/finetune/fold_ds002739_sub01
  contrastive_checkpoint_path: ""
  allow_missing_pretrain_checkpoint: true
  pretrain_mode: full
  pretrain_objective: contrastive
  pretrain_output_root: pretrained_weights
  num_classes: 2
  selection_metric: accuracy
  fusion: eeg_only
  classifier_mode: add
  eeg_baseline:
    enabled: false
    model_name: cbramod
    num_classes: 2
    num_channels: 53
    num_timepoints: 800
    load_pretrained_weights: false
    checkpoint_path: ""
  hidden_dim: 256
  dropout: 0.3
  freeze_encoders: false
  epochs: 100
  lr: 0.0003
  min_lr: 0.00001
  weight_decay: 0.01
  grad_clip: 1.0
  early_stop_patience: 20
  early_stop_min_delta: 0.0
  use_amp: true
  amp_dtype: fp16
  log_interval: 200
  eval_interval: 1
  visualization:
    train_curve:
      enabled: false
      output_dir: ""
    confusion_matrix:
      enabled: false
