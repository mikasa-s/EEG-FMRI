study:
  name: optuna_ds002336
  default_mode: full
  direction: maximize
  n_trials: 30
  output_dir: outputs/optuna/ds002336
  command:
  - bash
  - scripts_linux/run_optuna_pretrain_and_finetune.sh
  static_args:
  - --target-dataset
  - ds002336
  - --pretrain-datasets
  - ds002336,ds002338,ds002739
  output_arg: --output-root
runtime_configs:
  train_base: configs/train_joint_contrastive.yaml
  finetune_base: configs/finetune_ds002336.yaml
  train_arg: --joint-train-config
  finetune_arg: --finetune-config
metric:
  type: csv
  path: finetune/loso_finetune_summary.csv
  column: accuracy
  row_filter:
    fold: CROSS_FOLD_MEAN_STD
parameters:
  train_epochs:
    suggest: categorical
    choices:
    - 80
    - 100
    - 150
    target: config
    config_updates:
    - config: train
      key: train.epochs
    - config: finetune
      key: finetune.epochs
  pretrain_batch_size:
    suggest: categorical
    choices:
    - 512
    target: config
    config_updates:
    - config: train
      key: train.batch_size
    - config: train
      key: train.eval_batch_size
  finetune_batch_size:
    suggest: categorical
    choices:
    - 16
    - 32
    - 64
    - 128
    - 256
    target: config
    config_updates:
    - config: finetune
      key: train.batch_size
    - config: finetune
      key: train.eval_batch_size
  pretrain_lr:
    suggest: float
    low: 1e-4
    high: 1e-4
    log: true
    target: config
    config_updates:
    - config: train
      key: train.lr
  finetune_lr:
    suggest: float
    low: 1e-6
    high: 1e-4
    log: true
    target: config
    config_updates:
    - config: finetune
      key: finetune.lr
  weight_decay:
    suggest: float
    low: 1e-6
    high: 1e-2
    log: true
    target: config
    config_updates:
    - config: train
      key: train.weight_decay
    - config: finetune
      key: finetune.weight_decay
  min_lr:
    suggest: float
    low: 5e-5
    high: 1e-4
    log: true
    target: config
    config_updates:
    - config: train
      key: train.min_lr
    - config: finetune
      key: finetune.min_lr
  hidden_dim:
    suggest: categorical
    choices:
    - 64
    - 128
    - 256
    - 512
    target: config
    config_updates:
    - config: finetune
      key: finetune.hidden_dim
  grad_clip:
    suggest: categorical
    choices:
    - 0.0
    - 0.5
    - 1.0
    - 5.0
    target: config
    config_updates:
    - config: train
      key: train.grad_clip
    - config: finetune
      key: finetune.grad_clip
  early_stop_patience:
    suggest: categorical
    choices:
    - 5
    - 8
    - 10
    target: config
    config_updates:
    - config: finetune
      key: finetune.early_stop_patience
  n_layer:
    suggest: categorical
    choices:
    - 1
    - 2
    - 4
    - 6
    - 12
    target: config
    config_updates:
    - config: finetune
      key: eeg_model.n_layer
  dropout:
    suggest: categorical
    choices:
    - 0.1
    - 0.2
    - 0.3
    - 0.5
    target: config
    config_updates:
    - config: finetune
      key: finetune.dropout
parameter_groups:
  pretrain:
  - pretrain_lr
  finetune:
  - finetune_lr
  - dropout
modes:
  full:
    study_name: optuna_ds002336_full
    output_dir: outputs/optuna/ds002336_full
    parameter_groups:
    - pretrain
    - finetune
    - weight_decay
  finetune_only:
    study_name: optuna_ds002336_finetune_only
    output_dir: outputs/optuna/ds002336_finetune_only
    static_args:
    - --skip-pretrain
    metric:
      path: finetune/loso_finetune_summary.csv
      column: accuracy
      row_filter:
        fold: CROSS_FOLD_MEAN_STD
    parameter_groups:
    - finetune
  pretrain_only:
    study_name: optuna_ds002336_pretrain_only
    output_dir: outputs/optuna/ds002336_pretrain_only
    static_args:
    - --skip-finetune
    metric:
      type: json
      path: contrastive/final_metrics.json
      key: best_score
      transform: negate
    parameter_groups:
    - pretrain
