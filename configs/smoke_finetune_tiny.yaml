# tiny 分类微调 smoke test：接 tiny 对比学习 checkpoint 做快速联调
train:
  force_cpu: true
  batch_size: 2
  eval_batch_size: 2
  num_workers: 0
  pin_memory: false

data:
  train_manifest_csv: examples/tiny_manifest_train.csv
  val_manifest_csv: examples/tiny_manifest_val.csv
  test_manifest_csv: examples/tiny_manifest_test.csv
  root_dir: examples/tiny_sample_data
  normalize_eeg: true
  normalize_fmri: true
  eeg_scale: 1.0
  fmri_scale: 1.0

eeg_model:
  checkpoint_path: ""
  in_dim: 200
  out_dim: 200
  d_model: 200
  dim_feedforward: 800
  seq_len: 30
  n_layer: 2
  nhead: 8
  freeze_backbone: false

fmri_model:
  gradient_csv_path: assets/gradient_mapping_64.csv
  checkpoint_path: ""
  model_name: vit_small
  crop_size: [64, 80]
  patch_size: 8
  attn_mode: normal
  add_w: mapping
  freeze_backbone: false

finetune:
  output_dir: outputs/smoke_finetune_tiny
  contrastive_checkpoint_path: outputs/smoke_contrastive_tiny/checkpoints/best.pth
  num_classes: 2
  fusion: concat
  hidden_dim: 128
  dropout: 0.1
  freeze_encoders: false
  epochs: 1
  lr: 0.0001
  min_lr: 0.000001
  weight_decay: 0.01
  grad_clip: 1.0
  use_amp: false
  amp_dtype: fp16
  log_interval: 1
  eval_interval: 1
