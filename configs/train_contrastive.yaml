# 对比学习训练配置
train:
  # 输出目录与训练超参数
  output_dir: outputs/exp01
  epochs: 20
  batch_size: 16
  eval_batch_size: 32
  num_workers: 4
  pin_memory: true
  lr: 0.0001
  min_lr: 0.000001
  weight_decay: 0.01
  grad_clip: 1.0
  use_amp: true
  amp_dtype: fp16
  temperature: 0.07
  projection_dim: 256
  log_interval: 20
  eval_interval: 1
  resume_path: ""

data:
  # train/val/test 三个 split 的 manifest 清单
  train_manifest_csv: examples/manifest_train.csv
  val_manifest_csv: examples/manifest_val.csv
  test_manifest_csv: examples/manifest_test.csv
  root_dir: examples/sample_data
  normalize_eeg: true
  normalize_fmri: true
  eeg_scale: 1.0
  fmri_scale: 1.0

eeg_model:
  # EEG 骨干配置
  checkpoint_path: ""
  in_dim: 200
  out_dim: 200
  d_model: 200
  dim_feedforward: 800
  seq_len: 30
  n_layer: 12
  nhead: 8
  freeze_backbone: false

fmri_model:
  # fMRI 骨干配置
  gradient_csv_path: assets/gradient_mapping_450.csv
  checkpoint_path: ""
  model_name: vit_base
  crop_size: [450, 160]
  patch_size: 16
  attn_mode: normal
  add_w: mapping
  freeze_backbone: false
