# ds002336 的原生 block fMRI 配置模板。
# 这份配置假设：
# 1. 使用真实 450 ROI atlas，而不是从 400 ROI 插值到 450。
# 2. 20s block、TR=2s，因此每个 block 的原生 fMRI 长度是 10。
# 3. 用 patch_size=1 保持 10 个时间 patch，而不是把 10 插值成 160 再切 patch。
train:
  output_dir: outputs/contrastive_ds002336_true450_rawfmri
  epochs: 20
  batch_size: 16
  eval_batch_size: 32
  num_workers: 4
  pin_memory: true
  lr: 0.0001
  min_lr: 0.000001
  weight_decay: 0.01
  grad_clip: 1.0
  use_amp: true
  amp_dtype: fp16
  temperature: 0.07
  projection_dim: 256
  log_interval: 20
  eval_interval: 1
  resume_path: ""

data:
  train_manifest_csv: outputs/ds002336_true450_rawfmri/splits_subjectwise/manifest_train.csv
  val_manifest_csv: outputs/ds002336_true450_rawfmri/splits_subjectwise/manifest_val.csv
  test_manifest_csv: outputs/ds002336_true450_rawfmri/splits_subjectwise/manifest_test.csv
  root_dir: outputs/ds002336_true450_rawfmri
  expected_eeg_shape: [63, 20, 200]
  expected_fmri_shape: [450, 10]
  normalize_eeg: true
  normalize_fmri: true
  eeg_scale: 1.0
  fmri_scale: 1.0

eeg_model:
  checkpoint_path: ""
  in_dim: 200
  out_dim: 200
  d_model: 200
  dim_feedforward: 800
  seq_len: 20
  n_layer: 12
  nhead: 8
  freeze_backbone: false

fmri_model:
  gradient_csv_path: assets/gradient_mapping_450.csv
  checkpoint_path: ""
  model_name: vit_base
  crop_size: [450, 10]
  patch_size: 1
  attn_mode: normal
  add_w: mapping
  freeze_backbone: false